<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Pomodoro Tomato Timer</title>
    <style>
      /* --- UIの基本スタイル --- */
      :root {
        --text-color: #2c3e50;
        --btn-border: #7f8c8d;
        --btn-hover: rgba(255, 255, 255, 0.4);
      }

      body.dark-mode {
        --text-color: #ececec;
        --btn-border: #888888;
        --btn-hover: rgba(255, 255, 255, 0.2);
      }

      body {
        margin: 0;
        overflow: hidden;
        color: var(--text-color);
        font-family: "Yu Mincho", "Sawarabi Mincho", "Hiragino Mincho ProN", serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        /* 背景色は3D側のプログラムで描画します */
        background-color: #000; 
      }

      /* 3D描画用のキャンバスコンテナ */
      #three-canvas-container {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: 1;
      }

      /* タイマーUI（3Dの手前に表示） */
      .timer-container {
        position: relative;
        z-index: 10;
        text-align: center;
        /* 3Dのトマトに被っても文字が見やすいように強いシャドウを付与 */
        text-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 0 0 40px rgba(255, 255, 255, 0.4);
        pointer-events: none; /* UIの隙間から3Dを触れるようにする */
      }
      
      body.dark-mode .timer-container {
        text-shadow: 0 0 20px rgba(0, 0, 0, 0.9), 0 0 40px rgba(0, 0, 0, 0.6);
      }

      #time-display {
        font-size: clamp(5rem, 15vw, 9rem);
        font-weight: bold;
        margin: 0 0 40px 0;
        letter-spacing: 15px;
        text-indent: 15px;
      }

      .controls-wrapper {
        display: flex;
        flex-direction: column;
        gap: 20px;
        align-items: center;
        pointer-events: auto; /* ボタンはクリックできるように戻す */
      }

      .controls-group {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 15px;
      }

      .controls-group.settings {
        gap: 10px;
        margin-top: 10px;
      }

      .btn {
        background-color: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(4px); /* 背景の3Dを少しぼかすお洒落な効果 */
        color: var(--text-color);
        border: 1px solid var(--btn-border);
        padding: 12px 30px;
        font-size: 0.95rem;
        letter-spacing: 2px;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.4s ease;
        font-family: inherit;
        outline: none;
      }

      .btn:hover {
        background-color: var(--btn-hover);
        border-color: var(--text-color);
      }

      .btn.sub-action {
        opacity: 0.8;
        border-style: dashed;
        padding: 8px 20px;
        font-size: 0.85rem;
      }
      
      .btn.bgm-on {
        background-color: var(--btn-hover);
        border-style: solid;
      }

      @media (max-width: 600px) {
        #time-display { margin: 0 0 30px 0; }
        .controls-wrapper { gap: 15px; }
        .controls-group { gap: 10px; }
        .btn { padding: 10px 22px; font-size: 0.85rem; }
        .btn.sub-action { padding: 6px 16px; font-size: 0.75rem; }
      }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  </head>
  <body>
    <div id="three-canvas-container"></div>

    <div class="timer-container">
      <h1 id="time-display">25:00</h1>
      <div class="controls-wrapper">
        <div class="controls-group">
          <button id="work-btn" class="btn">25分集中</button>
          <button id="rest-btn" class="btn">5分休憩</button>
        </div>
        <div class="controls-group">
          <button id="start-btn" class="btn">スタート</button>
          <button id="pause-btn" class="btn">一時停止</button>
        </div>
        <div class="controls-group settings">
          <button id="bgm-btn" class="btn sub-action">BGM 再生</button>
          <button id="theme-btn" class="btn sub-action">テーマ切替</button>
          <button id="test-btn" class="btn sub-action">3秒テスト</button>
        </div>
      </div>
    </div>

    <script>
      /* =========================================
       1. 3Dシーン（Three.js）のセットアップ
       ========================================= */
      const container = document.getElementById('three-canvas-container');
      const scene = new THREE.Scene();
      
      // カメラの設定
      const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, 0, 12); // トマトを映す距離

      // レンダラー（描画エンジン）の設定
      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      container.appendChild(renderer.domElement);

      /* =========================================
       2. 3Dトマトのモデリング
       ========================================= */
      const tomatoGroup = new THREE.Group();
      scene.add(tomatoGroup);

      // トマトの赤い実（ツヤツヤの質感）
      const bodyGeo = new THREE.SphereGeometry(2.5, 64, 64);
      bodyGeo.scale(1, 0.85, 1); // 少し潰してトマトらしい形に
      const bodyMat = new THREE.MeshStandardMaterial({ 
        color: 0xe63946, 
        roughness: 0.3, // ツヤ感
        metalness: 0.1 
      });
      const tomatoBody = new THREE.Mesh(bodyGeo, bodyMat);
      tomatoGroup.add(tomatoBody);

      // トマトのヘタ（緑色の部分）
      const stemGeo = new THREE.CylinderGeometry(0.1, 0.05, 0.6, 8);
      const stemMat = new THREE.MeshStandardMaterial({ color: 0x2d6a4f, roughness: 0.7 });
      const stem = new THREE.Mesh(stemGeo, stemMat);
      stem.position.y = 2.1;
      tomatoGroup.add(stem);

      // ヘタの葉っぱ（5枚）
      for(let i = 0; i < 5; i++) {
        const pivot = new THREE.Group();
        pivot.position.y = 2.05;
        pivot.rotation.y = (Math.PI * 2 / 5) * i; // 均等に5方向に回転
        
        const leafGeo = new THREE.ConeGeometry(0.2, 1.2, 3);
        const leaf = new THREE.Mesh(leafGeo, stemMat);
        leaf.position.set(0, 0, 0.5);
        leaf.rotation.x = -Math.PI / 2.2; // 横に寝かせる
        pivot.add(leaf);
        tomatoGroup.add(pivot);
      }

      // トマトを少し傾けてオシャレに配置
      tomatoGroup.rotation.x = 0.2;
      tomatoGroup.rotation.z = -0.1;

      /* =========================================
       3. 照明（ライティング）の設定
       ========================================= */
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);

      const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
      dirLight.position.set(5, 10, 7);
      scene.add(dirLight);

      const backLight = new THREE.PointLight(0xffaaaa, 0.3, 20); // 背面からの赤い照り返し
      backLight.position.set(-5, -2, -5);
      scene.add(backLight);

      /* =========================================
       4. 背景のパーティクルと花火の設定
       ========================================= */
      const bgParticles = [];
      const explosionParticles = [];
      const petalColors = [0xffb6c1, 0xffdab9, 0xfffacd, 0xe0ffff, 0xe6e6fa];
      const goldColor = 0xd4c4a8;

      // 背景の粒を初期化
      function initBgParticles(isDark) {
        bgParticles.forEach(p => scene.remove(p.mesh));
        bgParticles.length = 0;

        const count = isDark ? 150 : 50;
        for (let i = 0; i < count; i++) {
          const size = isDark ? Math.random() * 0.05 + 0.02 : Math.random() * 0.15 + 0.05;
          const color = isDark ? 0xffffff : petalColors[Math.floor(Math.random() * petalColors.length)];
          const mat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: Math.random() * 0.5 + 0.2 });
          const mesh = new THREE.Mesh(new THREE.SphereGeometry(size, 8, 8), mat);
          
          // 画面全体に散らばらせる
          mesh.position.set((Math.random() - 0.5) * 30, (Math.random() - 0.5) * 20, (Math.random() - 0.5) * 15 - 5);
          scene.add(mesh);
          
          bgParticles.push({
            mesh: mesh,
            speedY: isDark ? 0 : -(Math.random() * 0.02 + 0.01),
            twinkleSpeed: isDark ? Math.random() * 0.02 + 0.01 : 0,
            angle: Math.random() * Math.PI * 2,
            isDark: isDark
          });
        }
      }

      // 3D花火の発生
      function create3DExplosion(isDark) {
        for (let i = 0; i < 300; i++) {
          const color = isDark ? goldColor : petalColors[Math.floor(Math.random() * petalColors.length)];
          const mat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 1 });
          const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), mat);
          
          mesh.position.copy(tomatoGroup.position); // トマトの位置から発生
          mesh.position.z -= 1; // トマトの少し奥から弾けさせる
          scene.add(mesh);

          const angle1 = Math.random() * Math.PI * 2;
          const angle2 = Math.random() * Math.PI * 2;
          const velocity = Math.random() * 0.3 + 0.1; // 広がる勢い

          explosionParticles.push({
            mesh: mesh,
            vx: Math.sin(angle1) * Math.cos(angle2) * velocity,
            vy: Math.sin(angle2) * velocity,
            vz: Math.cos(angle1) * Math.cos(angle2) * velocity,
            life: 1.0,
            fadeSpeed: Math.random() * 0.01 + 0.005
          });
        }
      }

      /* =========================================
       5. 共通ロジック（テーマ、BGM、タイマー）
       ========================================= */
      let isDarkMode = false;
      function applyTheme(forceMode) {
        isDarkMode = forceMode !== undefined ? forceMode : (new Date().getHours() >= 18 || new Date().getHours() < 6);
        document.body.classList.toggle("dark-mode", isDarkMode);
        
        // 3D空間の背景色を変更
        scene.background = new THREE.Color(isDarkMode ? '#0b0c14' : '#e6f0fa');
        
        // トマトの照明の強さを夜用に少し落とす
        ambientLight.intensity = isDarkMode ? 0.3 : 0.6;
        dirLight.intensity = isDarkMode ? 0.5 : 0.7;

        initBgParticles(isDarkMode);
      }
      document.getElementById("theme-btn").addEventListener("click", () => applyTheme(!isDarkMode));

      const bgmAudio = new Audio('bgm.mp3');
      bgmAudio.loop = true; 
      bgmAudio.volume = 0.5; 
      let isBgmPlaying = false;
      const bgmBtn = document.getElementById("bgm-btn");

      bgmBtn.addEventListener("click", () => {
        if (isBgmPlaying) {
          bgmAudio.pause();
          isBgmPlaying = false;
          bgmBtn.textContent = "BGM 再生";
          bgmBtn.classList.remove("bgm-on");
        } else {
          bgmAudio.play().then(() => {
            isBgmPlaying = true;
            bgmBtn.textContent = "BGM 停止";
            bgmBtn.classList.add("bgm-on");
          }).catch(e => alert("BGMファイル(bgm.mp3)が見つかりません。"));
        }
      });

      let timeLeft = 25 * 60;
      let timerId = null;
      let currentMode = "work"; 
      const timeDisplay = document.getElementById("time-display");

      function updateDisplay() {
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        timeDisplay.textContent = `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
      }

      function tick() {
        if (timeLeft > 0) {
          timeLeft--;
          updateDisplay();
        } else {
          clearInterval(timerId);
          timerId = null;
          
          // 3D花火を打ち上げ！
          create3DExplosion(isDarkMode);

          if (currentMode === "rest") {
            currentMode = "work";
            timeLeft = 25 * 60;
            updateDisplay();
          }
        }
      }

      document.getElementById("work-btn").addEventListener("click", () => {
        clearInterval(timerId); timerId = null; currentMode = "work"; timeLeft = 25 * 60; updateDisplay();
      });
      document.getElementById("rest-btn").addEventListener("click", () => {
        clearInterval(timerId); timerId = null; currentMode = "rest"; timeLeft = 5 * 60; updateDisplay();
      });
      document.getElementById("start-btn").addEventListener("click", () => {
        if (!timerId && timeLeft > 0) timerId = setInterval(tick, 1000);
      });
      document.getElementById("pause-btn").addEventListener("click", () => {
        clearInterval(timerId); timerId = null;
      });
      document.getElementById("test-btn").addEventListener("click", () => {
        clearInterval(timerId); timeLeft = 3; updateDisplay(); timerId = setInterval(tick, 1000);
      });

      /* =========================================
       6. アニメーションループ（毎フレームの描画）
       ========================================= */
      function animate() {
        requestAnimationFrame(animate);

        // タイマー稼働中はトマトがゆっくり回転する！
        if (timerId !== null) {
          tomatoGroup.rotation.y -= 0.005;
        }

        // 背景パーティクルのアニメーション
        bgParticles.forEach(p => {
          if (p.isDark) {
            p.angle += p.twinkleSpeed;
            p.mesh.material.opacity = Math.abs(Math.sin(p.angle)) * 0.8 + 0.2;
          } else {
            p.mesh.position.y += p.speedY;
            if (p.mesh.position.y < -10) p.mesh.position.y = 10;
          }
        });

        // 花火の物理演算（摩擦と重力）
        for (let i = explosionParticles.length - 1; i >= 0; i--) {
          const p = explosionParticles[i];
          p.vx *= 0.96; p.vy *= 0.96; p.vz *= 0.96; // 空気抵抗
          p.vy -= 0.005; // 重力
          
          p.mesh.position.x += p.vx;
          p.mesh.position.y += p.vy;
          p.mesh.position.z += p.vz;
          
          p.life -= p.fadeSpeed;
          p.mesh.material.opacity = p.life;

          if (p.life <= 0) {
            scene.remove(p.mesh);
            explosionParticles.splice(i, 1);
          }
        }

        renderer.render(scene, camera);
      }

      // ウィンドウサイズ変更対応
      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      // 実行開始
      applyTheme();
      animate();
    </script>
  </body>
</html>

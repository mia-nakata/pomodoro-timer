<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Pomodoro Tomato Timer - Veggie Explosion</title>
    <style>
      /* --- UIの基本スタイル --- */
      :root {
        --text-color: #2c3e50;
        --btn-border: #7f8c8d;
        --btn-hover: rgba(255, 255, 255, 0.4);
      }

      body.dark-mode {
        --text-color: #ececec;
        --btn-border: #888888;
        --btn-hover: rgba(255, 255, 255, 0.2);
      }

      body {
        margin: 0;
        overflow: hidden;
        color: var(--text-color);
        font-family: "Yu Mincho", "Sawarabi Mincho", "Hiragino Mincho ProN", serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #000; 
      }

      /* 3D描画用のキャンバスコンテナ */
      #three-canvas-container {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: 1;
      }

      /* タイマーUI（3Dの手前に表示） */
      .timer-container {
        position: relative;
        z-index: 10;
        text-align: center;
        text-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 0 0 40px rgba(255, 255, 255, 0.4);
        pointer-events: none;
      }
      
      body.dark-mode .timer-container {
        text-shadow: 0 0 20px rgba(0, 0, 0, 0.9), 0 0 40px rgba(0, 0, 0, 0.6);
      }

      #time-display {
        font-size: clamp(5rem, 15vw, 9rem);
        font-weight: bold;
        margin: 0;
        letter-spacing: 15px;
        text-indent: 15px;
      }

      /* 追加: セッションカウンターのスタイル */
      #session-counter {
        font-size: 1.2rem;
        letter-spacing: 2px;
        margin-bottom: 30px;
        opacity: 0.9;
      }
      #session-counter span {
        font-weight: bold;
        font-size: 1.5rem;
      }

      .controls-wrapper {
        display: flex;
        flex-direction: column;
        gap: 20px;
        align-items: center;
        pointer-events: auto;
      }

      .controls-group {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 15px;
      }

      .controls-group.settings {
        gap: 10px;
        margin-top: 10px;
      }

      .btn {
        background-color: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(4px);
        color: var(--text-color);
        border: 1px solid var(--btn-border);
        padding: 12px 30px;
        font-size: 0.95rem;
        letter-spacing: 2px;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.4s ease;
        font-family: inherit;
        outline: none;
        -webkit-tap-highlight-color: transparent;
      }

      .btn:hover {
        background-color: var(--btn-hover);
        border-color: var(--text-color);
      }

      .btn.sub-action {
        opacity: 0.8;
        border-style: dashed;
        padding: 8px 20px;
        font-size: 0.85rem;
      }
      
      .btn.bgm-on {
        opacity: 1;
        background-color: var(--btn-hover);
        border-color: var(--text-color);
        border-style: solid;
      }

      @media (max-width: 600px) {
        #time-display { margin: 0; }
        #session-counter { font-size: 1rem; margin-bottom: 20px; }
        .controls-wrapper { gap: 15px; }
        .controls-group { gap: 10px; }
        .btn { padding: 10px 22px; font-size: 0.85rem; }
        .btn.sub-action { padding: 6px 16px; font-size: 0.75rem; }
      }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  </head>
  <body>
    <div id="three-canvas-container"></div>

    <div class="timer-container">
      <h1 id="time-display">25:00</h1>
      <div id="session-counter">今日の集中回数: <span id="count-display">0</span> 回</div>
      
      <div class="controls-wrapper">
        <div class="controls-group">
          <button id="work-btn" class="btn">25分集中</button>
          <button id="rest-btn" class="btn">5分休憩</button>
        </div>
        <div class="controls-group">
          <button id="start-btn" class="btn">スタート</button>
          <button id="pause-btn" class="btn">一時停止</button>
        </div>
        <div class="controls-group settings">
          <button id="bgm-btn" class="btn sub-action">BGM 再生</button>
          <button id="theme-btn" class="btn sub-action">テーマ切替</button>
          <button id="test-btn" class="btn sub-action">3秒テスト</button>
        </div>
      </div>
    </div>

    <script>
      /* =========================================
       1. 3Dシーン（Three.js）のセットアップ
       ========================================= */
      const container = document.getElementById('three-canvas-container');
      const scene = new THREE.Scene();
      
      const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, 0, 12);

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      container.appendChild(renderer.domElement);

      /* =========================================
       2. 3Dトマトのモデリング
       ========================================= */
      const tomatoGroup = new THREE.Group();
      scene.add(tomatoGroup);

      let isTomatoVisible = true;
      let tomatoScale = 1.0; 

      const bodyGeo = new THREE.SphereGeometry(2.5, 64, 64);
      bodyGeo.scale(1, 0.85, 1); 
      const bodyMat = new THREE.MeshStandardMaterial({ 
        color: 0xe63946, 
        roughness: 0.3, 
        metalness: 0.1 
      });
      const tomatoBody = new THREE.Mesh(bodyGeo, bodyMat);
      tomatoGroup.add(tomatoBody);

      const stemGeo = new THREE.CylinderGeometry(0.1, 0.05, 0.6, 8);
      const stemMat = new THREE.MeshStandardMaterial({ color: 0x2d6a4f, roughness: 0.7 });
      const stem = new THREE.Mesh(stemGeo, stemMat);
      stem.position.y = 2.1;
      tomatoGroup.add(stem);

      for(let i = 0; i < 5; i++) {
        const pivot = new THREE.Group();
        pivot.position.y = 2.05;
        pivot.rotation.y = (Math.PI * 2 / 5) * i; 
        
        const leafGeo = new THREE.ConeGeometry(0.2, 1.2, 3);
        const leaf = new THREE.Mesh(leafGeo, stemMat);
        leaf.position.set(0, 0, 0.5);
        leaf.rotation.x = -Math.PI / 2.2; 
        pivot.add(leaf);
        tomatoGroup.add(pivot);
      }

      tomatoGroup.rotation.x = 0.2;
      tomatoGroup.rotation.z = -0.1;

      /* =========================================
       3. 照明（ライティング）の設定
       ========================================= */
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);

      const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
      dirLight.position.set(5, 10, 7);
      scene.add(dirLight);

      const backLight = new THREE.PointLight(0xffaaaa, 0.3, 20); 
      backLight.position.set(-5, -2, -5);
      scene.add(backLight);

      /* =========================================
       4. 背景パーティクルと「トマト爆発＆野菜」の設定
       ========================================= */
      const bgParticles = [];
      const explosionParticles = [];
      const petalColors = [0xffb6c1, 0xffdab9, 0xfffacd, 0xe0ffff, 0xe6e6fa];
      
      const veggiesList = ['🍅', '🥦', '🥕', '🌽', '🍆', '🍓', '🍊', '🍋', '🍇', '🥑'];
      const veggieTextures = [];

      function initVeggieTextures() {
        veggiesList.forEach(emoji => {
          const canvas = document.createElement('canvas');
          canvas.width = 128;
          canvas.height = 128;
          const ctx = canvas.getContext('2d');
          
          ctx.font = 'bold 80px Arial';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          
          ctx.shadowColor = 'white';
          ctx.shadowBlur = 15;
          ctx.strokeStyle = 'white';
          ctx.lineWidth = 5;
          
          ctx.strokeText(emoji, 64, 64);
          ctx.fillText(emoji, 64, 64);
          
          const texture = new THREE.CanvasTexture(canvas);
          veggieTextures.push(texture);
        });
      }
      initVeggieTextures();

      function initBgParticles(isDark) {
        bgParticles.forEach(p => scene.remove(p.mesh));
        bgParticles.length = 0;

        const count = isDark ? 150 : 50;
        for (let i = 0; i < count; i++) {
          const size = isDark ? Math.random() * 0.05 + 0.02 : Math.random() * 0.15 + 0.05;
          const color = isDark ? 0xffffff : petalColors[Math.floor(Math.random() * petalColors.length)];
          const mat = new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: Math.random() * 0.5 + 0.2 });
          const mesh = new THREE.Mesh(new THREE.SphereGeometry(size, 8, 8), mat);
          
          mesh.position.set((Math.random() - 0.5) * 30, (Math.random() - 0.5) * 20, (Math.random() - 0.5) * 15 - 5);
          scene.add(mesh);
          
          bgParticles.push({
            mesh: mesh,
            speedY: isDark ? 0 : -(Math.random() * 0.02 + 0.01),
            twinkleSpeed: isDark ? Math.random() * 0.02 + 0.01 : 0,
            angle: Math.random() * Math.PI * 2,
            isDark: isDark
          });
        }
      }

      function createVeggieExplosion() {
        for (let i = 0; i < 40; i++) {
          const fragmentMat = new THREE.MeshBasicMaterial({ color: 0xe63946 });
          const fragmentGeo = new THREE.SphereGeometry(Math.random() * 0.2 + 0.05, 4, 4);
          const fragment = new THREE.Mesh(fragmentGeo, fragmentMat);
          fragment.position.copy(tomatoGroup.position);
          scene.add(fragment);
          const angle1 = Math.random() * Math.PI * 2;
          const velocity = Math.random() * 0.6 + 0.2;
          explosionParticles.push({
            mesh: fragment, vx: Math.cos(angle1) * velocity, vy: Math.sin(angle1) * velocity + 0.2, vz: (Math.random() - 0.5) * velocity, rotSpeed: (Math.random() - 0.5) * 0.4, life: 1.0, fadeSpeed: Math.random() * 0.02 + 0.01
          });
        }
        for (let i = 0; i < 80; i++) { 
          const texture = veggieTextures[Math.floor(Math.random() * veggieTextures.length)];
          const mat = new THREE.SpriteMaterial({ map: texture, transparent: true, opacity: 1 });
          const sprite = new THREE.Sprite(mat);
          sprite.scale.set(Math.random() * 1.5 + 0.8, Math.random() * 1.5 + 0.8, 1);
          sprite.position.copy(tomatoGroup.position);
          sprite.position.z += Math.random() * 2; 
          scene.add(sprite);
          const angle1 = Math.random() * Math.PI * 2;
          const velocity = Math.random() * 0.4 + 0.15;
          explosionParticles.push({
            mesh: sprite, vx: Math.cos(angle1) * velocity, vy: Math.abs(Math.sin(angle1)) * velocity + 0.2, vz: (Math.random() - 0.5) * velocity, rotSpeed: (Math.random() - 0.5) * 0.2, life: 1.0, fadeSpeed: Math.random() * 0.01 + 0.005
          });
        }
      }

      function spawnTomato() {
        if (!isTomatoVisible) {
          isTomatoVisible = true;
          tomatoScale = 0;
          tomatoGroup.visible = true;
        }
      }

      /* =========================================
       5. 修正版: 音声制御とlocalStorage管理
       ========================================= */
      let audioCtx;

      // 修正: より「心地よい」と感じるクリスタル・チャイム音
      function playChime() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();

        const now = audioCtx.currentTime;

        // 音色を作成するヘルパー関数
        const playBell = (freq, volume, duration) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          
          osc.type = 'sine'; // 柔らかなサイン波
          osc.frequency.setValueAtTime(freq, now);
          
          gain.gain.setValueAtTime(0, now);
          gain.gain.linearRampToValueAtTime(volume, now + 0.02); // 優しい立ち上がり
          gain.gain.exponentialRampToValueAtTime(0.001, now + duration); // 長い残響
          
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          
          osc.start(now);
          osc.stop(now + duration);
        };

        // 複数の音を重ねて和音（C Major chord + high sparkle）を作る
        playBell(523.25, 0.15, 2.5); // C5 (ド)
        playBell(659.25, 0.10, 2.0); // E5 (ミ)
        playBell(783.99, 0.08, 1.8); // G5 (ソ)
        playBell(1046.50, 0.05, 1.5); // C6 (高いド - きらめき成分)
      }

      const countDisplay = document.getElementById("count-display");
      let todayWorkCount = 0;

      function loadCount() {
        const today = new Date().toDateString();
        const savedDate = localStorage.getItem("pomodoroDate");
        if (savedDate === today) {
          todayWorkCount = parseInt(localStorage.getItem("pomodoroCount") || "0", 10);
        } else {
          todayWorkCount = 0;
          localStorage.setItem("pomodoroDate", today);
          localStorage.setItem("pomodoroCount", "0");
        }
        countDisplay.textContent = todayWorkCount;
      }

      function incrementCount() {
        todayWorkCount++;
        localStorage.setItem("pomodoroCount", todayWorkCount.toString());
        countDisplay.textContent = todayWorkCount;
      }
      loadCount();

      /* =========================================
       6. 共通ロジック（テーマ、BGM、タイマー）
       ========================================= */
      let isDarkMode = false;
      function applyTheme(forceMode) {
        isDarkMode = forceMode !== undefined ? forceMode : (new Date().getHours() >= 18 || new Date().getHours() < 6);
        document.body.classList.toggle("dark-mode", isDarkMode);
        scene.background = new THREE.Color(isDarkMode ? '#0b0c14' : '#e6f0fa');
        ambientLight.intensity = isDarkMode ? 0.3 : 0.6;
        dirLight.intensity = isDarkMode ? 0.5 : 0.7;
        initBgParticles(isDarkMode);
      }
      document.getElementById("theme-btn").addEventListener("click", () => applyTheme(!isDarkMode));

      const bgmAudio = new Audio('bgm.mp3');
      bgmAudio.loop = true; 
      bgmAudio.volume = 0.5; 
      let isBgmPlaying = false;
      const bgmBtn = document.getElementById("bgm-btn");

      bgmBtn.addEventListener("click", () => {
        if (isBgmPlaying) {
          bgmAudio.pause();
          isBgmPlaying = false;
          bgmBtn.textContent = "BGM 再生";
          bgmBtn.classList.remove("bgm-on");
        } else {
          bgmAudio.play().then(() => {
            isBgmPlaying = true;
            bgmBtn.textContent = "BGM 停止";
            bgmBtn.classList.add("bgm-on");
          }).catch(e => alert("BGMファイル(bgm.mp3)が見つかりません。"));
        }
      });

      let timeLeft = 25 * 60;
      let timerId = null;
      let currentMode = "work"; 
      const timeDisplay = document.getElementById("time-display");

      function updateDisplay() {
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        timeDisplay.textContent = `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
      }

      function tick() {
        if (timeLeft > 0) {
          timeLeft--;
          updateDisplay();
        } else {
          clearInterval(timerId);
          timerId = null;
          isTomatoVisible = false;
          tomatoGroup.visible = false;
          createVeggieExplosion();
          playChime();

          if (currentMode === "work") {
            incrementCount(); 
          }

          if (currentMode === "rest") {
            currentMode = "work";
            timeLeft = 25 * 60;
            updateDisplay();
            spawnTomato();
          }
        }
      }

      function resumeAudio() {
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
      }

      document.getElementById("work-btn").addEventListener("click", () => {
        resumeAudio();
        clearInterval(timerId); timerId = null; currentMode = "work"; timeLeft = 25 * 60; updateDisplay(); spawnTomato();
      });
      document.getElementById("rest-btn").addEventListener("click", () => {
        resumeAudio();
        clearInterval(timerId); timerId = null; currentMode = "rest"; timeLeft = 5 * 60; updateDisplay(); spawnTomato();
      });
      document.getElementById("start-btn").addEventListener("click", () => {
        resumeAudio();
        if (!timerId && timeLeft > 0) timerId = setInterval(tick, 1000);
      });
      document.getElementById("pause-btn").addEventListener("click", () => {
        resumeAudio();
        clearInterval(timerId); timerId = null;
      });
      document.getElementById("test-btn").addEventListener("click", () => {
        resumeAudio();
        clearInterval(timerId); timeLeft = 3; updateDisplay(); timerId = setInterval(tick, 1000); spawnTomato();
      });

      /* =========================================
       7. アニメーションループ（毎フレームの描画）
       ========================================= */
      function animate() {
        requestAnimationFrame(animate);
        if (isTomatoVisible) {
          tomatoGroup.visible = true;
          tomatoScale += (1.0 - tomatoScale) * 0.15; 
          tomatoGroup.scale.set(tomatoScale, tomatoScale, tomatoScale);
        }
        if (timerId !== null && isTomatoVisible) {
          tomatoGroup.rotation.y -= 0.005;
        }

        bgParticles.forEach(p => {
          if (p.isDark) {
            p.angle += p.twinkleSpeed;
            p.mesh.material.opacity = Math.abs(Math.sin(p.angle)) * 0.8 + 0.2;
          } else {
            p.mesh.position.y += p.speedY;
            if (p.mesh.position.y < -10) p.mesh.position.y = 10;
          }
        });

        for (let i = explosionParticles.length - 1; i >= 0; i--) {
          const p = explosionParticles[i];
          p.vx *= 0.96; p.vy *= 0.96; p.vz *= 0.96; 
          p.vy -= 0.01; 
          p.mesh.position.x += p.vx; p.mesh.position.y += p.vy; p.mesh.position.z += p.vz;
          if (p.mesh.material.rotation !== undefined) p.mesh.material.rotation += p.rotSpeed;
          else { p.mesh.rotation.x += p.rotSpeed; p.mesh.rotation.y += p.rotSpeed; }
          if (p.vy < 0) p.life -= p.fadeSpeed;
          p.mesh.material.opacity = Math.max(0, p.life);
          if (p.life <= 0) {
            scene.remove(p.mesh);
            p.mesh.material.dispose();
            if (p.mesh.geometry) p.mesh.geometry.dispose();
            explosionParticles.splice(i, 1);
          }
        }
        renderer.render(scene, camera);
      }

      window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      applyTheme();
      animate();
    </script>
  </body>
</html>

<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Relaxing Pomodoro Timer - Responsive & Perfect UI</title>
    <style>
      /* --- 1. 配色の変数（グラデーション背景） --- */
      :root {
        --bg-gradient: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
        --text-color: #2c3e50;
        --btn-border: #7f8c8d;
        --btn-hover: rgba(255, 255, 255, 0.3);
      }

      body.dark-mode {
        --bg-gradient: linear-gradient(135deg, #090a0f 0%, #1b2735 100%);
        --text-color: #ececec;
        --btn-border: #888888;
        --btn-hover: rgba(255, 255, 255, 0.1);
      }

      /* --- 2. 全体のスタイル --- */
      body {
        margin: 0;
        overflow: hidden;
        background: var(--bg-gradient);
        color: var(--text-color);
        font-family:
          "Yu Mincho", "Sawarabi Mincho", "Hiragino Mincho ProN", serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      body::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: linear-gradient(135deg, #090a0f 0%, #1b2735 100%);
        opacity: 0;
        transition: opacity 2s ease;
        z-index: -1;
      }
      body.dark-mode::before {
        opacity: 1;
      }

      #particle-canvas {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: 1;
        pointer-events: none;
      }

      /* --- 3. タイマーUI --- */
      .timer-container {
        position: relative;
        z-index: 10;
        text-align: center;
        width: 100%;
        padding: 0 20px;
        box-sizing: border-box;
      }

      /* clampを使って画面幅に合わせて文字サイズをスムーズに可変させます */
      #time-display {
        font-size: clamp(5rem, 15vw, 9rem);
        font-weight: normal;
        margin: 0 0 40px 0;
        letter-spacing: 15px;
        text-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        /* スマホで文字間隔のせいで右にズレて見えるのを防ぐ調整 */
        text-indent: 15px; 
      }

      /* --- 4. ボタンのレイアウト（レスポンシブ対応） --- */
      .controls-wrapper {
        display: flex;
        flex-direction: column;
        gap: 20px;
        align-items: center;
      }

      .controls-group {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 15px;
      }

      /* 設定系のボタンは少し小さく・間隔を狭くして区別する */
      .controls-group.settings {
        gap: 10px;
        margin-top: 10px;
      }

      .btn {
        background-color: transparent;
        color: var(--text-color);
        border: 1px solid var(--btn-border);
        padding: 12px 30px;
        font-size: 0.95rem;
        letter-spacing: 2px;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.4s ease;
        font-family: inherit;
        outline: none;
        /* タップ時のハイライトを消す（スマホ用） */
        -webkit-tap-highlight-color: transparent;
      }

      .btn:hover {
        background-color: var(--btn-hover);
        border-color: var(--text-color);
      }

      /* サブアクション（設定など） */
      .btn.sub-action {
        opacity: 0.6;
        border-style: dashed;
        padding: 8px 20px;
        font-size: 0.85rem;
      }
      .btn.sub-action:hover {
        opacity: 1;
      }
      
      /* BGM再生中のスタイル */
      .btn.bgm-on {
        opacity: 1;
        background-color: var(--btn-hover);
        border-color: var(--text-color);
        border-style: solid;
      }

      /* =========================================
         スマートフォン用のスタイル調整
         画面幅が600px以下の場合に適用されます
         ========================================= */
      @media (max-width: 600px) {
        #time-display {
          margin: 0 0 30px 0;
        }
        
        .controls-wrapper {
          gap: 15px;
        }

        .controls-group {
          gap: 10px;
        }

        /* スマホ画面に合わせてボタンのサイズを少しコンパクトに */
        .btn {
          padding: 10px 22px;
          font-size: 0.85rem;
        }

        .btn.sub-action {
          padding: 6px 16px;
          font-size: 0.75rem;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="particle-canvas"></canvas>

    <div class="timer-container">
      <h1 id="time-display">25:00</h1>
      
      <div class="controls-wrapper">
        <div class="controls-group">
          <button id="work-btn" class="btn">25分集中</button>
          <button id="rest-btn" class="btn">5分休憩</button>
        </div>
        
        <div class="controls-group">
          <button id="start-btn" class="btn">スタート</button>
          <button id="pause-btn" class="btn">一時停止</button>
        </div>
        
        <div class="controls-group settings">
          <button id="bgm-btn" class="btn sub-action">BGM 再生</button>
          <button id="theme-btn" class="btn sub-action">テーマ切替</button>
          <button id="test-btn" class="btn sub-action">3秒テスト</button>
        </div>
      </div>
    </div>

    <script>
      /* =========================================
       0. オフスクリーンキャンバスによる高速化処理
       ========================================= */
      const explosionCaches = {};
      const goldColor = "rgba(212, 196, 168, 1)";
      const petalColors = [
        "rgba(255, 182, 193, 0.8)", 
        "rgba(255, 218, 185, 0.8)", 
        "rgba(255, 250, 205, 0.8)", 
        "rgba(224, 255, 255, 0.8)", 
        "rgba(230, 230, 250, 0.8)"
      ];

      function createExplosionCache(color) {
        const c = document.createElement("canvas");
        c.width = 40; 
        c.height = 40;
        const cCtx = c.getContext("2d");
        cCtx.fillStyle = color;
        cCtx.shadowBlur = 10;
        cCtx.shadowColor = color;
        cCtx.beginPath();
        cCtx.arc(20, 20, 2, 0, Math.PI * 2);
        cCtx.fill();
        return c;
      }

      petalColors.forEach(color => { explosionCaches[color] = createExplosionCache(color); });
      explosionCaches[goldColor] = createExplosionCache(goldColor);

      /* =========================================
       1. BGMの音声制御ロジック
       ========================================= */
      const bgmAudio = new Audio('bgm.mp3');
      bgmAudio.loop = true; 
      bgmAudio.volume = 0.5; 

      let isBgmPlaying = false;
      const bgmBtn = document.getElementById("bgm-btn");

      bgmBtn.addEventListener("click", () => {
        if (isBgmPlaying) {
          bgmAudio.pause();
          isBgmPlaying = false;
          bgmBtn.textContent = "BGM 再生";
          bgmBtn.classList.remove("bgm-on");
        } else {
          bgmAudio.play().then(() => {
            isBgmPlaying = true;
            bgmBtn.textContent = "BGM 停止";
            bgmBtn.classList.add("bgm-on");
          }).catch(error => {
            alert("BGMを再生できませんでした。\nHTMLファイルと同じ場所に「bgm.mp3」という名前の音楽ファイルが置かれているか確認してください。");
            console.error(error);
          });
        }
      });

      /* =========================================
       2. テーマ切り替えと初期化
       ========================================= */
      let isDarkMode = false;
      function applyTheme(forceMode) {
        if (forceMode !== undefined) {
          isDarkMode = forceMode;
        } else {
          const hour = new Date().getHours();
          isDarkMode = hour >= 18 || hour < 6;
        }
        if (isDarkMode) {
          document.body.classList.add("dark-mode");
        } else {
          document.body.classList.remove("dark-mode");
        }
        initParticles();
      }
      document.getElementById("theme-btn").addEventListener("click", () => applyTheme(!isDarkMode));

      /* =========================================
       3. タイマーロジック
       ========================================= */
      let timeLeft = 25 * 60;
      let timerId = null;
      let currentMode = "work"; 
      const timeDisplay = document.getElementById("time-display");

      function updateDisplay() {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        timeDisplay.textContent = `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
      }

      function tick() {
        if (timeLeft > 0) {
          timeLeft--;
          updateDisplay();
        } else {
          clearInterval(timerId);
          timerId = null;
          
          createExplosion(window.innerWidth / 2, window.innerHeight / 2);

          if (currentMode === "rest") {
            currentMode = "work";
            timeLeft = 25 * 60;
            updateDisplay();
          }
        }
      }

      document.getElementById("work-btn").addEventListener("click", () => {
        clearInterval(timerId);
        timerId = null;
        currentMode = "work";
        timeLeft = 25 * 60;
        updateDisplay();
      });

      document.getElementById("rest-btn").addEventListener("click", () => {
        clearInterval(timerId);
        timerId = null;
        currentMode = "rest";
        timeLeft = 5 * 60;
        updateDisplay();
      });

      document.getElementById("start-btn").addEventListener("click", () => {
        if (timerId === null && timeLeft > 0) timerId = setInterval(tick, 1000);
      });

      document.getElementById("pause-btn").addEventListener("click", () => {
        clearInterval(timerId);
        timerId = null;
      });

      document.getElementById("test-btn").addEventListener("click", () => {
        clearInterval(timerId);
        timeLeft = 3;
        updateDisplay();
        timerId = setInterval(tick, 1000);
      });

      /* =========================================
       4. Canvas描画ロジック
       ========================================= */
      const canvas = document.getElementById("particle-canvas");
      const ctx = canvas.getContext("2d");

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();

      const particlesArray = [];

      class Particle {
        constructor(x, y, type) {
          this.x = x; this.y = y; this.type = type; 

          if (this.type === "explosion") {
            const angle = Math.random() * Math.PI * 2;
            const velocity = Math.random() * 12 + 6;
            this.speedX = Math.cos(angle) * velocity;
            this.speedY = Math.sin(angle) * velocity;
            this.size = Math.random() * 1.5 + 0.5; 
            this.opacity = 1;
            this.fadeSpeed = Math.random() * 0.004 + 0.003;
            
            if (isDarkMode) {
              this.fireworkColor = goldColor; 
            } else {
              this.fireworkColor = petalColors[Math.floor(Math.random() * petalColors.length)];
            }
          } else if (this.type === "shootingStar") {
            this.speedX = Math.random() * 2 + 3;
            this.speedY = Math.random() * 2 + 3;
            this.size = Math.random() * 1.5 + 0.5;
            this.opacity = 1;
            this.fadeSpeed = 0.005;
          } else if (this.type === "star") {
            this.speedX = 0; this.speedY = 0;
            this.size = Math.random() * 1.5 + 0.2;
            this.angle = Math.random() * Math.PI * 2;
            this.twinkleSpeed = Math.random() * 0.02 + 0.005;
            this.opacity = 0;
          } else {
            this.baseX = x;
            this.speedY = Math.random() * 0.3 + 0.15;
            this.size = Math.random() * 6 + 4;
            this.angle = Math.random() * Math.PI * 2;
            this.rotationSpeed = (Math.random() - 0.5) * 0.01;
            this.swaySpeed = Math.random() * 0.01 + 0.005;
            this.petalColor = petalColors[Math.floor(Math.random() * petalColors.length)];
            this.opacity = Math.random() * 0.4 + 0.4;
          }
        }

        update() {
          if (this.type === "explosion") {
            this.speedX *= 0.98;
            this.speedY *= 0.98;
            this.speedY += 0.02;
            this.x += this.speedX;
            this.y += this.speedY;
            this.opacity -= this.fadeSpeed;
          } else if (this.type === "petal") {
            this.angle += this.swaySpeed;
            this.x = this.baseX + Math.sin(this.angle) * 30;
            this.y += this.speedY;
            if (this.y > canvas.height + 20) {
              this.y = -20;
              this.baseX = Math.random() * canvas.width;
            }
          } else if (this.type === "star") {
            this.angle += this.twinkleSpeed;
            this.opacity = Math.abs(Math.sin(this.angle));
          } else {
            this.x += this.speedX;
            this.y += this.speedY;
            this.opacity -= this.fadeSpeed;
          }
        }

        draw() {
          ctx.save();
          ctx.globalAlpha = Math.max(0, this.opacity);

          if (this.type === "shootingStar") {
            const tailLength = 60;
            const grad = ctx.createLinearGradient(
              this.x, this.y, this.x - this.speedX * tailLength, this.y - this.speedY * tailLength,
            );
            grad.addColorStop(0, "rgba(255, 255, 255, 1)");
            grad.addColorStop(1, "rgba(255, 255, 255, 0)");
            ctx.strokeStyle = grad;
            ctx.lineWidth = this.size;
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x - this.speedX * tailLength, this.y - this.speedY * tailLength);
            ctx.stroke();
          } else if (this.type === "star") {
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
          } else if (this.type === "explosion") {
            const cache = explosionCaches[this.fireworkColor];
            const scale = this.size / 2;
            const drawSize = 40 * scale; 
            const offset = 20 * scale;   
            
            ctx.drawImage(cache, this.x - offset, this.y - offset, drawSize, drawSize);

            ctx.strokeStyle = this.fireworkColor;
            ctx.lineWidth = this.size * 0.5;
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x - this.speedX * 3, this.y - this.speedY * 3);
            ctx.stroke();
          } else {
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle * 2);
            ctx.fillStyle = this.petalColor;
            ctx.beginPath();
            ctx.ellipse(0, 0, this.size, this.size * 2, 0, 0, Math.PI * 2);
            ctx.fill();
          }
          ctx.restore();
        }
      }

      function initParticles() {
        particlesArray.length = 0;
        if (isDarkMode) {
          for (let i = 0; i < 150; i++) particlesArray.push(new Particle(Math.random() * canvas.width, Math.random() * canvas.height, "star"));
        } else {
          for (let i = 0; i < 40; i++) particlesArray.push(new Particle(Math.random() * canvas.width, Math.random() * canvas.height, "petal"));
        }
      }

      function createExplosion(x, y) {
        for (let i = 0; i < 400; i++) particlesArray.push(new Particle(x, y, "explosion"));
      }

      function animate() {
        if (isDarkMode) {
          ctx.fillStyle = "rgba(11, 12, 20, 0.2)"; 
        } else {
          ctx.fillStyle = "rgba(255, 255, 255, 0.2)"; 
        }
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (timerId !== null) {
          if (isDarkMode && Math.random() < 0.003) {
            const x = Math.random() * (canvas.width * 0.8);
            const y = Math.random() * (canvas.height * 0.5) - 50;
            particlesArray.push(new Particle(x, y, "shootingStar"));
          }
        }

        for (let i = 0; i < particlesArray.length; i++) {
          particlesArray[i].update();
          particlesArray[i].draw();

          const p = particlesArray[i];
          const isOffScreen = (p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height);
          
          if (p.opacity <= 0 || (p.type === "explosion" && isOffScreen)) {
            particlesArray.splice(i, 1);
            i--;
          }
        }
        requestAnimationFrame(animate);
      }

      applyTheme(); 
      animate(); 
    </script>
  </body>
</html>

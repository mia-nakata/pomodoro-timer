<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Relaxing Pomodoro Timer - Slow & Colorful Firework</title>
    <style>
      /* --- 1. 配色の変数（グラデーション背景） --- */
      :root {
        /* ライトモード（爽やかな晴天） */
        --bg-gradient: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
        --text-color: #2c3e50;
        --btn-border: #7f8c8d;
        --btn-hover: rgba(255, 255, 255, 0.3);
      }

      body.dark-mode {
        /* ダークモード（深みのある星空） */
        --bg-gradient: linear-gradient(135deg, #090a0f 0%, #1b2735 100%);
        --text-color: #ececec;
        --btn-border: #888888;
        --btn-hover: rgba(255, 255, 255, 0.1);
      }

      /* --- 2. 全体のスタイル --- */
      body {
        margin: 0;
        overflow: hidden;
        background: var(--bg-gradient);
        color: var(--text-color);
        font-family:
          "Yu Mincho", "Sawarabi Mincho", "Hiragino Mincho ProN", serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      body::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: linear-gradient(135deg, #090a0f 0%, #1b2735 100%);
        opacity: 0;
        transition: opacity 2s ease;
        z-index: -1;
      }
      body.dark-mode::before {
        opacity: 1;
      }

      #particle-canvas {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: 1;
        pointer-events: none;
      }

      /* --- 3. タイマーUI --- */
      .timer-container {
        position: relative;
        z-index: 10;
        text-align: center;
      }

      #time-display {
        font-size: 8rem;
        font-weight: normal;
        margin: 0 0 40px 0;
        letter-spacing: 15px;
        text-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
      }

      /* --- 4. ゴーストボタン --- */
      .controls {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 15px;
      }

      .btn {
        background-color: transparent;
        color: var(--text-color);
        border: 1px solid var(--btn-border);
        padding: 12px 30px;
        font-size: 0.95rem;
        letter-spacing: 2px;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.5s ease;
        font-family: inherit;
        outline: none;
      }

      .btn:hover {
        background-color: var(--btn-hover);
        border-color: var(--text-color);
      }

      .btn.sub-action {
        opacity: 0.5;
        border-style: dashed;
      }
      .btn.sub-action:hover {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <canvas id="particle-canvas"></canvas>

    <div class="timer-container">
      <h1 id="time-display">25:00</h1>
      <div class="controls">
        <button id="start-btn" class="btn">スタート</button>
        <button id="pause-btn" class="btn">一時停止</button>
        <button id="reset-btn" class="btn">リセット</button>
        <button id="test-btn" class="btn sub-action">3秒テスト</button>
        <button id="theme-btn" class="btn sub-action">テーマ切替</button>
      </div>
    </div>

    <script>
      /* =========================================
       0. カラー設定と高速化キャッシュの作成
       ========================================= */
      const goldColor = "rgba(212, 196, 168, 1)";
      const petalColors = [
        "rgba(255, 182, 193, 0.8)", // ピンク
        "rgba(255, 218, 185, 0.8)", // ピーチ
        "rgba(255, 250, 205, 0.8)", // レモン
        "rgba(224, 255, 255, 0.8)", // シアン
        "rgba(230, 230, 250, 0.8)"  // ラベンダー
      ];

      // ★ 高速化：色ごとの「光の粒」を裏側で事前生成しておく
      function createSparkCanvas(color) {
        const c = document.createElement("canvas");
        c.width = 30; c.height = 30;
        const ctx = c.getContext("2d");
        ctx.fillStyle = color;
        ctx.shadowBlur = 10;
        ctx.shadowColor = color;
        ctx.beginPath();
        ctx.arc(15, 15, 1.5, 0, Math.PI * 2);
        ctx.fill();
        return c;
      }

      const sparkCaches = {
        gold: createSparkCanvas(goldColor),
        petals: petalColors.map(color => createSparkCanvas(color))
      };


      /* =========================================
       1. テーマ切り替え
       ========================================= */
      let isDarkMode = false;

      function applyTheme(forceMode) {
        if (forceMode !== undefined) {
          isDarkMode = forceMode;
        } else {
          const hour = new Date().getHours();
          isDarkMode = hour >= 18 || hour < 6;
        }

        if (isDarkMode) {
          document.body.classList.add("dark-mode");
        } else {
          document.body.classList.remove("dark-mode");
        }
        initParticles();
      }

      document.getElementById("theme-btn").addEventListener("click", () => {
        applyTheme(!isDarkMode);
      });

      /* =========================================
       2. タイマーロジック
       ========================================= */
      let timeLeft = 25 * 60;
      let timerId = null;
      const timeDisplay = document.getElementById("time-display");

      function updateDisplay() {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        timeDisplay.textContent = `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
      }

      function tick() {
        if (timeLeft > 0) {
          timeLeft--;
          updateDisplay();
        } else {
          clearInterval(timerId);
          timerId = null;
          createExplosion(window.innerWidth / 2, window.innerHeight / 2);
        }
      }

      document.getElementById("start-btn").addEventListener("click", () => {
        if (timerId === null && timeLeft > 0) timerId = setInterval(tick, 1000);
      });
      document.getElementById("pause-btn").addEventListener("click", () => {
        clearInterval(timerId);
        timerId = null;
      });
      document.getElementById("reset-btn").addEventListener("click", () => {
        clearInterval(timerId);
        timerId = null;
        timeLeft = 25 * 60;
        updateDisplay();
      });
      document.getElementById("test-btn").addEventListener("click", () => {
        clearInterval(timerId);
        timeLeft = 3;
        updateDisplay();
        timerId = setInterval(tick, 1000);
      });

      /* =========================================
       3. Canvas描画ロジック
       ========================================= */
      const canvas = document.getElementById("particle-canvas");
      const ctx = canvas.getContext("2d");

      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      window.addEventListener("resize", resizeCanvas);
      resizeCanvas();

      const particlesArray = [];

      class Particle {
        constructor(x, y, type) {
          this.x = x;
          this.y = y;
          this.type = type;

          if (this.type === "explosion") {
            const angle = Math.random() * Math.PI * 2;
            
            // ★ ゆっくり上品に広がるように初速を抑える（6〜18の範囲）
            const velocity = Math.random() * 12 + 6;
            this.speedX = Math.cos(angle) * velocity;
            this.speedY = Math.sin(angle) * velocity;

            this.size = Math.random() * 1.5 + 0.5;
            this.opacity = 1;
            this.fadeSpeed = Math.random() * 0.004 + 0.003;

            // ★ テーマに合わせた色（事前作成した画像）のセット
            if (isDarkMode) {
              this.sparkCanvas = sparkCaches.gold;
              this.fireworkColor = goldColor;
            } else {
              // ライトモードはランダムにカラフルな色を選ぶ
              const randIdx = Math.floor(Math.random() * petalColors.length);
              this.sparkCanvas = sparkCaches.petals[randIdx];
              this.fireworkColor = petalColors[randIdx];
            }

          } else if (this.type === "shootingStar") {
            this.speedX = Math.random() * 2 + 3;
            this.speedY = Math.random() * 2 + 3;
            this.size = Math.random() * 1.5 + 0.5;
            this.opacity = 1;
            this.fadeSpeed = 0.005;

          } else if (this.type === "star") {
            this.speedX = 0;
            this.speedY = 0;
            this.size = Math.random() * 1.5 + 0.2;
            this.angle = Math.random() * Math.PI * 2;
            this.twinkleSpeed = Math.random() * 0.02 + 0.005;
            this.opacity = 0;

          } else {
            this.baseX = x;
            this.speedY = Math.random() * 0.3 + 0.15;
            this.size = Math.random() * 6 + 4;
            this.angle = Math.random() * Math.PI * 2;
            this.rotationSpeed = (Math.random() - 0.5) * 0.01;
            this.swaySpeed = Math.random() * 0.01 + 0.005;
            this.petalColor = petalColors[Math.floor(Math.random() * petalColors.length)];
            this.opacity = Math.random() * 0.4 + 0.4;
          }
        }

        update() {
          if (this.type === "explosion") {
            // ★ 摩擦と重力：ゆっくり優雅にフワッと落ちるバランス
            this.speedX *= 0.98;
            this.speedY *= 0.98;
            this.speedY += 0.02;

            this.x += this.speedX;
            this.y += this.speedY;
            this.opacity -= this.fadeSpeed;

          } else if (this.type === "petal") {
            this.angle += this.swaySpeed;
            this.x = this.baseX + Math.sin(this.angle) * 30;
            this.y += this.speedY;
            if (this.y > canvas.height + 20) {
              this.y = -20;
              this.baseX = Math.random() * canvas.width;
            }

          } else if (this.type === "star") {
            this.angle += this.twinkleSpeed;
            this.opacity = Math.abs(Math.sin(this.angle));

          } else {
            this.x += this.speedX;
            this.y += this.speedY;
            this.opacity -= this.fadeSpeed;
          }
        }

        draw() {
          ctx.save();
          ctx.globalAlpha = Math.max(0, this.opacity);

          if (this.type === "shootingStar") {
            const tailLength = 60;
            const grad = ctx.createLinearGradient(
              this.x, this.y,
              this.x - this.speedX * tailLength,
              this.y - this.speedY * tailLength
            );
            grad.addColorStop(0, "rgba(255, 255, 255, 1)");
            grad.addColorStop(1, "rgba(255, 255, 255, 0)");
            ctx.strokeStyle = grad;
            ctx.lineWidth = this.size;
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x - this.speedX * tailLength, this.y - this.speedY * tailLength);
            ctx.stroke();

          } else if (this.type === "star") {
            ctx.fillStyle = "#ffffff";
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();

          } else if (this.type === "explosion") {
            // 事前生成した画像を貼り付けて高速描画（色も自動で切り替わる）
            ctx.drawImage(this.sparkCanvas, this.x - 15, this.y - 15);

            // 花火の繊細な光の尾
            ctx.strokeStyle = this.fireworkColor;
            ctx.lineWidth = this.size * 0.5;
            ctx.beginPath();
            ctx.moveTo(this.x, this.y);
            ctx.lineTo(this.x - this.speedX * 2.5, this.y - this.speedY * 2.5);
            ctx.stroke();

          } else {
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle * 2);
            ctx.fillStyle = this.petalColor;
            ctx.beginPath();
            ctx.ellipse(0, 0, this.size, this.size * 2, 0, 0, Math.PI * 2);
            ctx.fill();
          }

          ctx.restore();
        }
      }

      function initParticles() {
        particlesArray.length = 0;
        if (isDarkMode) {
          for (let i = 0; i < 120; i++) particlesArray.push(new Particle(Math.random() * canvas.width, Math.random() * canvas.height, "star"));
        } else {
          for (let i = 0; i < 40; i++) particlesArray.push(new Particle(Math.random() * canvas.width, Math.random() * canvas.height, "petal"));
        }
      }

      function createExplosion(x, y) {
        // 動作が軽いので400個の美しい光を放つ
        for (let i = 0; i < 400; i++) particlesArray.push(new Particle(x, y, "explosion"));
      }

      function animate() {
        if (isDarkMode) {
          ctx.fillStyle = "rgba(11, 12, 20, 0.2)"; 
        } else {
          ctx.fillStyle = "rgba(255, 255, 255, 0.2)"; 
        }
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        if (timerId !== null) {
          if (isDarkMode && Math.random() < 0.003) {
            const x = Math.random() * (canvas.width * 0.8);
            const y = Math.random() * (canvas.height * 0.5) - 50;
            particlesArray.push(new Particle(x, y, "shootingStar"));
          }
        }

        for (let i = 0; i < particlesArray.length; i++) {
          particlesArray[i].update();
          particlesArray[i].draw();

          const p = particlesArray[i];
          const isOffScreen = (p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height);
          
          if (p.opacity <= 0 || (p.type === "explosion" && isOffScreen)) {
            particlesArray.splice(i, 1);
            i--;
          }
        }
        requestAnimationFrame(animate);
      }

      applyTheme(); 
      animate(); 
    </script>
  </body>
</html>

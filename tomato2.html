<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Physical Tomato Timer - Fixed</title>
    <style>
      /* --- 1. UIの基本スタイル（image_2.png のデザインを維持） --- */
      :root {
        --text-color: #2c3e50;
        --btn-border: #7f8c8d;
        --btn-hover: rgba(255, 255, 255, 0.4);
      }

      body.dark-mode {
        --text-color: #ececec;
        --btn-border: #888888;
        --btn-hover: rgba(255, 255, 255, 0.2);
      }

      body {
        margin: 0;
        overflow: hidden;
        color: var(--text-color);
        font-family: "Arial", sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #e6f0fa;
        transition: background 1s ease;
      }

      body.dark-mode {
        background-color: #0b0c14;
      }

      #three-canvas-container {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        z-index: 1;
      }

      /* トマトの中央に配置されるタイマー文字 */
      .timer-display-wrapper {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 10;
        pointer-events: none;
        transition: opacity 0.3s ease;
      }

      #time-display {
        font-size: clamp(3rem, 10vw, 5rem);
        font-weight: 900;
        margin: 0;
        color: #ffffff;
        letter-spacing: 2px;
        text-shadow: 0 0 10px rgba(0,0,0,0.5), 0 0 20px rgba(0,0,0,0.3);
      }

      .controls-container {
        position: absolute;
        bottom: 10%;
        left: 50%;
        transform: translateX(-50%);
        z-index: 20;
        text-align: center;
      }

      .controls-group {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 10px;
      }

      .btn {
        background-color: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(8px);
        color: var(--text-color);
        border: 1px solid var(--btn-border);
        padding: 10px 20px;
        font-size: 0.85rem;
        letter-spacing: 1px;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.3s ease;
        outline: none;
      }

      .btn:hover {
        background-color: var(--btn-hover);
        border-color: var(--text-color);
      }

      .btn.sub-action {
        opacity: 0.7;
        border-style: dashed;
        font-size: 0.75rem;
      }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  </head>
  <body>
    <div id="three-canvas-container"></div>

    <div class="timer-display-wrapper" id="timer-wrapper">
      <h1 id="time-display">25:00</h1>
    </div>

    <div class="controls-container">
      <div class="controls-group">
        <button id="work-btn" class="btn">25分集中</button>
        <button id="rest-btn" class="btn">5分休憩</button>
        <button id="start-btn" class="btn">スタート</button>
        <button id="pause-btn" class="btn">停止</button>
      </div>
      <div class="controls-group">
        <button id="theme-btn" class="btn sub-action">テーマ切替</button>
        <button id="test-btn" class="btn sub-action">3秒テスト</button>
      </div>
    </div>

    <script>
      /* =========================================
       1. Three.js セットアップ
       ========================================= */
      const container = document.getElementById('three-canvas-container');
      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
      camera.position.set(0, 0, 12);

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      container.appendChild(renderer.domElement);

      /* =========================================
       2. メモリテクスチャの生成
       ========================================= */
      function createScaleTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 2048; canvas.height = 256;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#e63946';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'white';
        ctx.strokeStyle = 'white';
        ctx.textAlign = 'center';
        ctx.font = 'bold 80px Arial';

        const totalMinutes = 60;
        for (let i = 0; i <= totalMinutes; i++) {
          const x = (i / totalMinutes) * canvas.width;
          if (i % 5 === 0) {
            ctx.lineWidth = 6;
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 80); ctx.stroke();
            if (i !== 60) ctx.fillText(i, x, 180);
          } else {
            ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 40); ctx.stroke();
          }
        }
        const texture = new THREE.CanvasTexture(canvas);
        texture.wrapS = THREE.RepeatWrapping;
        return texture;
      }
      const scaleTexture = createScaleTexture();

      /* =========================================
       3. 物理タイマートマトの構築
       ========================================= */
      const tomatoGroup = new THREE.Group();
      scene.add(tomatoGroup);

      const tomatoUpperGroup = new THREE.Group();
      const tomatoLowerGroup = new THREE.Group();
      tomatoGroup.add(tomatoUpperGroup);
      tomatoGroup.add(tomatoLowerGroup);

      let isTomatoVisible = true;
      let tomatoScale = 1.0; 
      let isExploded = false;

      // 下半分（メモリ）
      const lowerGeo = new THREE.SphereGeometry(2.5, 64, 32, 0, Math.PI * 2, Math.PI / 2, Math.PI / 2);
      const lowerMat = new THREE.MeshStandardMaterial({ map: scaleTexture, roughness: 0.4 });
      const tomatoLower = new THREE.Mesh(lowerGeo, lowerMat);
      tomatoLowerGroup.add(tomatoLower);

      // 上半分
      const upperGeo = new THREE.SphereGeometry(2.5, 64, 32, 0, Math.PI * 2, 0, Math.PI / 2);
      const upperMat = new THREE.MeshStandardMaterial({ color: 0xe63946, roughness: 0.3 });
      const tomatoUpper = new THREE.Mesh(upperGeo, upperMat);
      tomatoUpperGroup.add(tomatoUpper);

      // ヘタ
      const stemMat = new THREE.MeshStandardMaterial({ color: 0x2d6a4f, roughness: 0.7 });
      const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.05, 0.6, 8), stemMat);
      stem.position.y = 2.4;
      tomatoUpperGroup.add(stem);

      for(let i = 0; i < 5; i++) {
        const leaf = new THREE.Mesh(new THREE.ConeGeometry(0.2, 1.2, 3), stemMat);
        leaf.position.set(Math.cos(i * 1.25) * 0.5, 2.3, Math.sin(i * 1.25) * 0.5);
        leaf.rotation.x = 1.5; leaf.rotation.z = i * 1.25;
        tomatoUpperGroup.add(leaf);
      }

      // インジケーター ▼
      const arrow = new THREE.Mesh(new THREE.ConeGeometry(0.15, 0.3, 3), new THREE.MeshBasicMaterial({ color: 0xffffff }));
      arrow.position.set(0, 0.1, 2.45);
      arrow.rotation.x = Math.PI;
      tomatoUpperGroup.add(arrow);

      tomatoGroup.rotation.x = 0.2;

      // 照明
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);
      const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
      dirLight.position.set(5, 10, 7);
      scene.add(dirLight);

      /* =========================================
       4. 爆発ロジック
       ========================================= */
      const explosionParticles = [];
      const veggies = ['🍅', '🥦', '🥕', '🌽', '🍆', '🍋'];
      const veggieTextures = veggies.map(v => {
        const c = document.createElement('canvas');
        c.width = 64; c.height = 64;
        const ctx = c.getContext('2d');
        ctx.font = '50px Arial'; ctx.fillText(v, 5, 50);
        return new THREE.CanvasTexture(c);
      });

      function createExplosion() {
        for (let i = 0; i < 30; i++) {
          const fragment = new THREE.Mesh(new THREE.SphereGeometry(0.15, 4, 4), new THREE.MeshBasicMaterial({ color: 0xe63946 }));
          fragment.position.copy(tomatoGroup.position);
          scene.add(fragment);
          const angle = Math.random() * Math.PI * 2;
          const velocity = Math.random() * 0.5 + 0.2;
          explosionParticles.push({
            mesh: fragment, vx: Math.cos(angle) * velocity, vy: Math.sin(angle) * velocity + 0.2, vz: (Math.random() - 0.5) * velocity, life: 1.0, fadeSpeed: 0.02
          });
        }
        for (let i = 0; i < 50; i++) {
          const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: veggieTextures[i % veggies.length], transparent: true }));
          sprite.scale.set(1.2, 1.2, 1);
          sprite.position.copy(tomatoGroup.position);
          scene.add(sprite);
          const angle = Math.random() * Math.PI * 2;
          const velocity = Math.random() * 0.4 + 0.1;
          explosionParticles.push({
            mesh: sprite, vx: Math.cos(angle) * velocity, vy: Math.abs(Math.sin(angle)) * velocity + 0.3, vz: (Math.random() - 0.5) * velocity, life: 1.0, fadeSpeed: 0.01, isVeggie: true
          });
        }
      }

      /* =========================================
       5. タイマーロジック
       ========================================= */
      let timeLeft = 25 * 60;
      let timerId = null;
      const timeDisplay = document.getElementById("time-display");
      const timerWrapper = document.getElementById("timer-wrapper");

      function updateDisplay() {
        const m = Math.floor(timeLeft / 60);
        const s = timeLeft % 60;
        timeDisplay.textContent = `${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
        if (!isExploded) {
          tomatoLowerGroup.rotation.y = -(timeLeft / 60) * (Math.PI * 2 / 60);
        }
      }

      function tick() {
        if (timeLeft > 0) {
          timeLeft--;
          updateDisplay();
        } else {
          clearInterval(timerId); timerId = null;
          isExploded = true; isTomatoVisible = false;
          tomatoGroup.visible = false;
          timerWrapper.style.opacity = "0";
          createExplosion();
        }
      }

      function resetTomato() {
        isExploded = false; isTomatoVisible = true;
        tomatoScale = 0;
        timerWrapper.style.opacity = "1";
        updateDisplay();
      }

      // --- ボタンイベント ---
      document.getElementById("work-btn").onclick = () => { clearInterval(timerId); timerId = null; timeLeft = 25 * 60; resetTomato(); };
      document.getElementById("rest-btn").onclick = () => { clearInterval(timerId); timerId = null; timeLeft = 5 * 60; resetTomato(); };
      document.getElementById("start-btn").onclick = () => { if (!timerId && !isExploded && timeLeft > 0) timerId = setInterval(tick, 1000); };
      document.getElementById("pause-btn").onclick = () => { clearInterval(timerId); timerId = null; };
      document.getElementById("test-btn").onclick = () => { clearInterval(timerId); timeLeft = 3; resetTomato(); timerId = setInterval(tick, 1000); };

      // テーマ切替
      let isDarkMode = false;
      function applyTheme() {
        document.body.classList.toggle("dark-mode", isDarkMode);
        scene.background = new THREE.Color(isDarkMode ? '#0b0c14' : '#e6f0fa');
        ambientLight.intensity = isDarkMode ? 0.3 : 0.6;
        dirLight.intensity = isDarkMode ? 0.5 : 0.7;
      }
      document.getElementById("theme-btn").onclick = () => { isDarkMode = !isDarkMode; applyTheme(); };

      /* =========================================
       6. アニメーションループ
       ========================================= */
      function animate() {
        requestAnimationFrame(animate);
        if (isTomatoVisible) {
          tomatoGroup.visible = true;
          tomatoScale += (1.0 - tomatoScale) * 0.1;
          tomatoGroup.scale.set(tomatoScale, tomatoScale, tomatoScale);
        }
        for (let i = explosionParticles.length - 1; i >= 0; i--) {
          const p = explosionParticles[i];
          p.vy -= 0.01;
          p.mesh.position.x += p.vx; p.mesh.position.y += p.vy; p.mesh.position.z += p.vz;
          p.life -= p.fadeSpeed;
          p.mesh.material.opacity = Math.max(0, p.life);
          if (p.life <= 0) { scene.remove(p.mesh); explosionParticles.splice(i, 1); }
        }
        renderer.render(scene, camera);
      }

      window.onresize = () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      };

      // 実行
      applyTheme();
      updateDisplay();
      animate();
    </script>
  </body>
</html>
